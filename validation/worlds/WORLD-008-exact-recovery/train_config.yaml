# Phase 4B-2 recovery fixture — paths resolved relative to bundle dir at runtime.
framework: ridge_bo
model_form: semi_log
run_environment: research
random_seed: 8008
data:
  path: panel.parquet
  geo_column: geo_id
  week_column: week_start_date
  target_column: revenue
  channel_columns:
    - search
    - social
    - display
  control_columns: []
  data_version_id: WORLD-008-exact-recovery-recovery
cv:
  mode: rolling
  n_splits: 2
  min_train_weeks: 10
  horizon_weeks: 2
ridge_bo:
  n_trials: 12
  sampler_seed: 8008
transforms:
  adstock: geometric
  saturation: hill
