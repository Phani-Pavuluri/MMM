name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,tracking]"
      - name: Ruff
        run: ruff check mmm tests scripts
      - name: Pytest
        run: pytest tests/ -q -m "not slow"

  release-gates:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,tracking]"
      - name: Documentation validation
        run: python scripts/validate_docs.py
      - name: Artifact lifecycle and compatibility
        run: pytest tests/test_artifact_lifecycle_e2e.py tests/test_artifact_factory.py tests/test_mlflow_lifecycle_e2e.py tests/test_artifacts.py -q
      - name: Reproducibility and lineage gates
        run: pytest tests/test_seed_resolution.py tests/test_fingerprint_completeness.py tests/test_drift_historical.py tests/test_run_registry.py -q
      - name: CLI/API parity smoke
        run: pytest tests/test_cli_decide_shims.py tests/test_docs_validation.py -q
      - name: Train to decide E2E
        run: pytest tests/test_train_decide_e2e.py -q
      - name: Stabilization gates
        run: |
          pytest tests/test_artifact_tier_enforcement.py tests/test_decision_safe_contract.py \
            tests/test_log_log_recovery.py tests/test_synthetic_recovery_strengthened.py \
            tests/test_replay_holdout_split.py tests/test_cv_masks_ridge_bo.py \
            tests/test_baseline_beat_waiver.py -q
